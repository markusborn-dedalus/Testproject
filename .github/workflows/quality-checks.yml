name: "Quality Checks"

on:
  pull_request:
    types: [ "opened", "reopened", "synchronize" ]
  workflow_dispatch: { }

jobs:
  run-tests:
    if: github.event.pull_request.merged == false
    runs-on:
      labels: docker
    steps:
      - name: "Setup"
        uses: dedalus-cis4u/with-standard-setup@v2.0.15
        with:
          git-checkout: 'all'
          maven: true
          java: 21

      - name: "Run tests"
        run: mvn -ntp clean verify

      - name: "Upload coverage report"
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: jacoco-report-aggregate/target/site/jacoco-aggregate/jacoco.xml
          if-no-files-found: error

  run-sonar:
    runs-on:
      labels: docker
    env:
      SONAR_CMD_BASE: >
        mvn --batch-mode --no-transfer-progress sonar:sonar
        -Dsonar.token=$SONAR_TOKEN
        -Dsonar.coverage.jacoco.xmlReportPaths="test-coverage-report/target/site/jacoco-aggregate/jacoco.xml"
        -Dsonar.projectKey=HOPF-${{ github.event.repository.name }}
        -Dsonar.projectName=HOPF-${{ github.event.repository.name }}
        -Dsonar.host.url=https://sonarqube.orbis.dedalus.com/central-test
        -Dsonar.qualitygate.wait=true
        -Dsonar.plugins.downloadOnlyRequired=true
      CI_PR_NUMBER: ${{ github.event.number }}
      CI_GITHUB_EVENT_NAME: ${{ github.event_name }}
      CI_GITHUB_HEAD_REF: ${{ github.head_ref }}
      CI_GITHUB_BASE_REF: ${{ github.base_ref }}
      CI_GITHUB_REPOSITORY: ${{ github.repository }}
    needs: run-tests
    steps:
      - name: "Setup"
        uses: dedalus-cis4u/with-standard-setup@v2.0.15

      - name: "Download coverage report"
        uses: actions/download-artifact@v4
        with:
          name: coverage
          path: coverage

      - name: "Run SonarQube Analysis (manually triggered)"
        if: github.event_name == 'workflow_dispatch'
        run: |
          $SONAR_CMD_BASE

      - name: "Run SonarQube Analysis (pull request)"
        if: github.event_name == 'pull_request'
        run: |
          $SONAR_CMD_BASE \
            -Dsonar.pullrequest.provider=github \
            -Dsonar.pullrequest.key=$CI_PR_NUMBER \
            -Dsonar.pullrequest.branch=$CI_GITHUB_HEAD_REF \
            -Dsonar.pullrequest.base=$CI_GITHUB_BASE_REF \
            -Dsonar.pullrequest.github.repository=$CI_GITHUB_REPOSITORY \
            -Dsonar.scm.provider=git